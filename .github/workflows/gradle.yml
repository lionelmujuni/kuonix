name: Build, Test, and Generate Doxygen Docs

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ----- Gradle Build & Test  -----
  gradle-test:
    name: Gradle Build & Test
    runs-on: ubuntu-latest

    container:
      image: gradle:8.14.3-jdk24
      # Gradle cache is handled below via the setup-gradle action

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Cache Gradle dependencies
      - name: Setup Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false

      - name: Display Gradle and Java versions
        run: |
          gradle --version
          java -version

      - name: Run tests
        working-directory: restful
        run: gradle test

  # ----- Generate Doxygen Docs  -----
  generate-doxygen-docs:
    name: Generate Doxygen Docs
    runs-on: ubuntu-latest

    container:
      image: debian:bullseye-slim

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Doxygen and Graphviz
        run: |
          apt-get update
          apt-get install -y doxygen graphviz

      - name: Run Doxygen
        run: doxygen Doxyfile

      # Upload the generated HTML docs as a workflow artifact
      - name: Upload Doxygen documentation
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-docs
          path: docs/html/**

  # ----- Frontend Vitest (tier 1 unit + tier 2 component) -----
  # Runs the fast frontend test suite. Skips gracefully when test scaffolding
  # is not yet present so the workflow stays green during the rollout.
  frontend-tests:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect Vitest scaffolding
        id: check
        run: |
          if [ -f frontend/vitest.config.js ] || [ -f frontend/vitest.config.ts ] || [ -f frontend/vitest.config.mjs ]; then
            echo "scaffolded=true" >> "$GITHUB_OUTPUT"
          else
            echo "scaffolded=false" >> "$GITHUB_OUTPUT"
            echo "::notice::frontend/vitest.config.* not found — Vitest job skipped. Add the config and an npm test script to activate."
          fi

      - name: Setup Node.js
        if: steps.check.outputs.scaffolded == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.check.outputs.scaffolded == 'true'
        working-directory: frontend
        run: npm ci

      - name: Run Vitest
        if: steps.check.outputs.scaffolded == 'true'
        working-directory: frontend
        run: npm run test:coverage

      - name: Upload coverage report
        if: steps.check.outputs.scaffolded == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/**
          if-no-files-found: ignore

  # ----- Frontend Playwright E2E (tier 3 — Electron) -----
  # Drives the real Electron app under xvfb against a stub backend on :8081.
  # Skipped until playwright.config.* exists.
  frontend-e2e:
    name: Frontend E2E (Playwright + Electron)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect Playwright scaffolding
        id: check
        run: |
          if [ -f frontend/playwright.config.js ] || [ -f frontend/playwright.config.ts ] || [ -f frontend/playwright.config.mjs ]; then
            echo "scaffolded=true" >> "$GITHUB_OUTPUT"
          else
            echo "scaffolded=false" >> "$GITHUB_OUTPUT"
            echo "::notice::frontend/playwright.config.* not found — Playwright job skipped. Add the config and an npm run test:e2e script to activate."
          fi

      - name: Setup Node.js
        if: steps.check.outputs.scaffolded == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.check.outputs.scaffolded == 'true'
        working-directory: frontend
        run: npm ci

      # Electron uses Chromium under the hood; Playwright's chromium deps cover it.
      - name: Install Playwright system dependencies
        if: steps.check.outputs.scaffolded == 'true'
        working-directory: frontend
        run: npx playwright install-deps chromium

      # Electron needs an X server on Linux runners — xvfb-run wraps the script.
      - name: Run Playwright E2E
        if: steps.check.outputs.scaffolded == 'true'
        working-directory: frontend
        run: xvfb-run --auto-servernum --server-args='-screen 0 1280x720x24' npm run test:e2e

      - name: Upload Playwright report
        if: steps.check.outputs.scaffolded == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/**
            frontend/test-results/**
          if-no-files-found: ignore
